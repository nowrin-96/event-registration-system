<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Tech Talk 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>College Tech Talk 2026</h1>
      <p class="subtitle">Empowering Innovation & Ideas</p>
    </header>

    <div class="card">
      <h2>Register Now</h2>
      <form id="registrationForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="example@domain.com" required />
        </div>

        <div class="form-group">
          <label for="department">Department</label>
          <input type="text" id="department" placeholder="Your department" required />
        </div>

        <button type="submit">🚀 Register</button>
      </form>

      <p id="result"></p>
    </div>

    <footer>
      <p>© 2026 College Tech Talk | Designed with ❤️</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
